# ShellForge — AgentGuard Governance Policy
# Mode: enforce (block violations)

mode: educate

policies:
  - name: no-force-push
    description: Prevent force pushes to any remote
    match:
      command: "git push"
      args_contain: ["--force", "-f", "--force-with-lease"]
    action: deny
    message: "Force push is not allowed by governance policy"

  - name: no-destructive-rm
    description: Block all rm invocations (plain rm, -r, -rf, etc.)
    match:
      command: "rm"
    action: deny
    message: "rm is not allowed by governance policy — use targeted file operations instead"

  - name: file-write-constraints
    description: Agents may only write to outputs/ and agents' own workspace
    match:
      command: "write_file"
      path_not_under:
        - outputs/
        - .tmp/
    action: deny
    message: "File writes restricted to outputs/ directory"

  - name: test-before-merge
    description: Stub — require tests to pass before merge (not enforced yet)
    match:
      command: "git merge"
    action: monitor
    message: "Test-before-merge policy (monitoring only)"

  - name: bounded-execution
    description: Agents must exit within timeout
    match:
      command: "*"
    timeout_seconds: 300
    action: monitor
    message: "Agent execution timeout tracking"

telemetry:
  enabled: true
  local_sqlite: true
  cloud: false
